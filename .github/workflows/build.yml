name: Build Ghidra Debian Package

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

# in view of the NodeJS 20 deprecation
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Debian Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y devscripts debhelper dpkg-dev lintian fakeroot rsync

      - name: Extract Versioning Info
        id: pkg_info
        run: |
          DEB_VERSION=$(dpkg-parsechangelog -S Version)
          UPSTREAM_VERSION=$(echo $DEB_VERSION | cut -d'-' -f1)
          echo "DEB_VERSION=$DEB_VERSION" >> $GITHUB_ENV
          echo "UPSTREAM_VERSION=$UPSTREAM_VERSION" >> $GITHUB_ENV

      - name: Prepare Strict Debian Build Environment
        run: |
          mkdir -p build_env/${{ github.event.repository.name }}-${UPSTREAM_VERSION}
          rsync -a --exclude='.git' --exclude='build_env' ./ build_env/${{ github.event.repository.name }}-${UPSTREAM_VERSION}/
          cd build_env
          tar -cJvf ${{ github.event.repository.name }}_${UPSTREAM_VERSION}.orig.tar.xz --exclude='debian' ${{ github.event.repository.name }}-${UPSTREAM_VERSION}/

      - name: Build Official Debian Package (debuild)
        run: |
          cd build_env/${{ github.event.repository.name }}-${UPSTREAM_VERSION}
          debuild -us -uc -b --no-lintian

      - name: Create Clean Source Code Archives (Zip & Tar.gz)
        run: |
          git archive --format=zip --output=${{ github.event.repository.name }}_${UPSTREAM_VERSION}_source.zip HEAD
          git archive --format=tar.gz --output=${{ github.event.repository.name }}_${UPSTREAM_VERSION}_source.tar.gz HEAD

      - name: Upload All Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.repository.name }}-${{ env.DEB_VERSION }}-professional-build
          path: |
            build_env/*.deb
            build_env/*.changes
            build_env/*.buildinfo
            *_source.zip
            *_source.tar.gz
