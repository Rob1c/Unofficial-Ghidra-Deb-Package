name: Build Ghidra Debian Package

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Debian Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential devscripts debhelper dpkg-dev lintian fakeroot rsync jq wget unzip

      - name: Fetch Latest Ghidra Release Data
        id: ghidra_api
        run: |
          JSON=$(curl -s https://api.github.com/repos/NationalSecurityAgency/ghidra/releases/latest)
          DOWNLOAD_URL=$(echo "$JSON" | jq -r '.assets[] | select(.name | endswith(".zip")) | .browser_download_url')
          VERSION_TAG=$(echo "$JSON" | jq -r '.tag_name' | sed 's/Ghidra_//;s/_build//')

          echo "url=$DOWNLOAD_URL" >> $GITHUB_OUTPUT
          echo "version=$VERSION_TAG" >> $GITHUB_OUTPUT

          # set env vars
          echo "UPSTREAM_VERSION=$VERSION_TAG" >> $GITHUB_ENV
          echo "DEB_VERSION=${VERSION_TAG}-1" >> $GITHUB_ENV

      - name: Download Ghidra
        run: wget ${{ steps.ghidra_api.outputs.url }} -O ghidra.zip

      - name: Prepare Strict Debian Build Environment
        run: |
          # 1. creates debuild structure
          STRUCTURE_DIR="build_env/${{ github.event.repository.name }}-${{ env.UPSTREAM_VERSION }}"
          mkdir -p "$STRUCTURE_DIR"

          # 2. cp packaging files (control, postinst, desktop, svg)
          rsync -a --exclude='.git' --exclude='build_env' --exclude='ghidra.zip' ./ "$STRUCTURE_DIR/"

          # 3. exract ghidra
          mkdir -p "$STRUCTURE_DIR/opt/ghidra"
          unzip ghidra.zip -d temp_ghidra
          mv temp_ghidra/*/* "$STRUCTURE_DIR/opt/ghidra/"
          rm -rf temp_ghidra

          # 4. generates source (excluding debian folder)
          cd build_env
          tar -cJvf ${{ github.event.repository.name }}_${{ env.UPSTREAM_VERSION }}.orig.tar.xz --exclude='debian' ${{ github.event.repository.name }}-${{ env.UPSTREAM_VERSION }}/

      - name: Build Official Debian Package (debuild)
        run: |
          cd build_env/${{ github.event.repository.name }}-${{ env.UPSTREAM_VERSION }}
          chmod +x debian/postinst debian/postrm debian/rules
          debuild -b -us -uc

      - name: Create Clean Source Code Archives (Zip & Tar.gz)
        run: |
          git archive --format=zip --output=${{ github.event.repository.name }}_${{ env.UPSTREAM_VERSION }}_source.zip HEAD
          git archive --format=tar.gz --output=${{ github.event.repository.name }}_${{ env.UPSTREAM_VERSION }}_source.tar.gz HEAD

      - name: Upload All Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.repository.name }}-${{ env.DEB_VERSION }}-build
          path: |
            build_env/*.deb
            build_env/*.changes
            build_env/*.buildinfo
            *_source.zip
            *_source.tar.gz
