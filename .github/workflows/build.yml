name: Build Ghidra Debian Package

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - 'docs/**'
      - '**.png'
      - '**.svg'
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - 'docs/**'
      - '**.png'
      - '**.svg'
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

# in view of Node 20 deprecation
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.compare.outputs.should_build }}

    steps:
      # fetch latest Ghidra tag (official NSA repo)
      - name: Fetch Latest Ghidra
        id: nsa
        run: |
          RAW_TAG=$(curl -s https://api.github.com/repos/NationalSecurityAgency/ghidra/releases/latest | jq -r '.tag_name // empty')
          if [ -z "$RAW_TAG" ]; then
            echo "ERROR: unable to fetch latest Ghidra tag from NSA repo"
            exit 1
          fi
          # normalize to the same format used for our own release tags (e.g. Ghidra_11.2_build -> 11.2)
          VERSION=$(echo "$RAW_TAG" | sed 's/Ghidra_//;s/_build//')
          echo "tag=$VERSION" >> $GITHUB_OUTPUT

      # fetch latest UNOFFICIAL Ghidra deb package tag
      - name: Fetch Latest UnoDebGhidra
        id: unodeb
        run: |
          TAG=$(curl -s "https://api.github.com/repos/${{ github.repository }}/releases/latest" | jq -r '.tag_name // empty')
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      # compare versions and trigger
      - name: Compare Versions and Trigger
        id: compare
        run: |
          NSA_VERSION="${{ steps.nsa.outputs.tag }}"
          UNODEB_VERSION="${{ steps.unodeb.outputs.tag }}"
          EVENT_NAME="${{ github.event_name }}"

          echo "Detected Ghidra version: $NSA_VERSION"
          echo "Detected Unofficial Deb Package version: $UNODEB_VERSION"
          echo "Event: $EVENT_NAME"

          # Event type 1: Human (push, "run workflow" etc...)
          # Entrambi i tag sono ora normalizzati nello stesso formato (es. "11.2") negli step precedenti
          if [ "$EVENT_NAME" = "push" ] || [ "$EVENT_NAME" = "workflow_dispatch" ] || [ "$EVENT_NAME" = "pull_request" ]; then
            echo "Human activation detected. Triggering build"
            echo "should_build=true" >> $GITHUB_OUTPUT

          # Event type 2: time-scheduled compare, the latest Ghidra version is different from the UnoDeb one
          elif [ "$NSA_VERSION" != "$UNODEB_VERSION" ]; then
            echo "Different Ghidra version detected. Triggering build"
            echo "should_build=true" >> $GITHUB_OUTPUT

          # Event type 3: both versions are equal
          else
            echo "No updates were found. Skipping build"
            echo "should_build=false" >> $GITHUB_OUTPUT
          fi

  build:
    runs-on: ubuntu-latest
    needs: check
    if: needs.check.outputs.should_build == 'true'
    outputs:
      version: ${{ steps.ghidra_api.outputs.version }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Debian Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential devscripts debhelper dpkg-dev lintian fakeroot rsync jq wget unzip

      - name: Fetch Latest Ghidra Release Data
        id: ghidra_api
        run: |
          JSON=$(curl -s https://api.github.com/repos/NationalSecurityAgency/ghidra/releases/latest)
          DOWNLOAD_URL=$(echo "$JSON" | jq -r '.assets[] | select(.name | endswith(".zip")) | .browser_download_url')
          VERSION_TAG=$(echo "$JSON" | jq -r '.tag_name' | sed 's/Ghidra_//;s/_build//')

          echo "url=$DOWNLOAD_URL" >> $GITHUB_OUTPUT
          echo "version=$VERSION_TAG" >> $GITHUB_OUTPUT

          echo "UPSTREAM_VERSION=$VERSION_TAG" >> $GITHUB_ENV
          echo "DEB_VERSION=${VERSION_TAG}-1" >> $GITHUB_ENV

      - name: Download Ghidra
        run: wget "${{ steps.ghidra_api.outputs.url }}" -O ghidra.zip

      - name: Prepare Strict Debian Build Environment
        run: |
          REPO="${{ github.event.repository.name }}"
          VERSION="${{ env.UPSTREAM_VERSION }}"
          STRUCTURE_DIR="build_env/${REPO}-${VERSION}"

          # 1. create debuild structure
          mkdir -p "$STRUCTURE_DIR"

          # 2. cp packaging files (with debian/)
          rsync -a --exclude='.git' --exclude='build_env' --exclude='ghidra.zip' ./ "$STRUCTURE_DIR/"

          # 3. exract Ghidra in opt/ghidra/
          mkdir -p "$STRUCTURE_DIR/opt/ghidra"
          unzip -q ghidra.zip -d temp_ghidra
          GHIDRA_INNER=$(find temp_ghidra -mindepth 1 -maxdepth 1 -type d | head -1)
          if [ -z "$GHIDRA_INNER" ]; then
            echo "ERROR: Ghidra zip extraction failed or unexpected structure"
            ls -la temp_ghidra/
            exit 1
          fi
          mv "$GHIDRA_INNER"/* "$STRUCTURE_DIR/opt/ghidra/"
          rm -rf temp_ghidra

          # 4. updates changelog with latest version
          cat > "$STRUCTURE_DIR/debian/changelog" <<EOF
          ghidra (${VERSION}-1) unstable; urgency=low

            * Automated build for Ghidra ${VERSION}.

           -- Roberto Chichiarelli <roberto.chichiarelli@gmail.com>  $(date -R)
          EOF

          # 5. generate tarball
          cd build_env
          tar -cJf "${REPO}_${VERSION}.orig.tar.xz" \
            --exclude="${REPO}-${VERSION}/debian" \
            "${REPO}-${VERSION}/"

      - name: Build Official Debian Package (debuild)
        run: |
          REPO="${{ github.event.repository.name }}"
          VERSION="${{ env.UPSTREAM_VERSION }}"
          cd "build_env/${REPO}-${VERSION}"
          chmod +x debian/postinst debian/postrm debian/rules
          debuild -b -us -uc

      - name: Debug - List build output
        if: always()
        run: |
          echo "=== build_env contents ==="
          ls -lah build_env/
          echo "=== all .deb files ==="
          find . -name "*.deb" | xargs ls -lah 2>/dev/null || echo "No .deb found"

      - name: Create Clean Source Code Archives (Zip & Tar.gz)
        run: |
          REPO="${{ github.event.repository.name }}"
          VERSION="${{ env.UPSTREAM_VERSION }}"
          git archive --format=zip --output="${REPO}_${VERSION}_source.zip" HEAD
          git archive --format=tar.gz --output="${REPO}_${VERSION}_source.tar.gz" HEAD

      - name: Upload All Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.repository.name }}-${{ env.DEB_VERSION }}-build
          path: |
            build_env/*.deb
            build_env/*.changes
            build_env/*.buildinfo
            *_source.zip
            *_source.tar.gz

  sign-and-publish:
    runs-on: ubuntu-latest
    needs: build
    if: needs.check.outputs.should_build == 'true'
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: ${{ github.event.repository.name }}-*-build
          merge-multiple: true
          path: dist/

      - name: Install GPG Tools
        run: sudo apt-get update && sudo apt-get install -y gnupg

      - name: Import GPG Signing Key
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import

      - name: Sign .deb and generate checksums
        run: |
          cd dist
          for deb in build_env/*.deb; do
            echo "Signing $deb ..."
            sha256sum "$deb" > "${deb}.sha256"
            gpg --batch --yes --pinentry-mode loopback \
              --passphrase "${{ secrets.GPG_PASSPHRASE }}" \
              --local-user "${{ secrets.GPG_KEY_ID }}" \
              --detach-sign --armor -o "${deb}.asc" "$deb"
            gpg --batch --yes --pinentry-mode loopback \
              --passphrase "${{ secrets.GPG_PASSPHRASE }}" \
              --local-user "${{ secrets.GPG_KEY_ID }}" \
              --detach-sign --armor -o "${deb}.sha256.asc" "${deb}.sha256"
          done
          ls -lah

      - name: Create GitHub Release with signed artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build.outputs.version }}
          files: |
            dist/build_env/*.deb
            dist/build_env/*.asc
            dist/build_env/*.sha256
            dist/build_env/*.sha256.asc
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
